<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>2 BIMENTRE</title>
    <style>
        header {
            background: rgba(58, 12, 163, 0.75);
            color: white;
            font-size: 30px;
            font-family: Sans-serif;
            font-style: italic;
            padding:20px ;
            text-align: center;
            }
        .container {
            width: 100%; 
            max-width: 500px; 
            margin: 20px auto;
            padding: 24px; 
            background-color: rgba(58, 12, 163, 0.75);
            color: #e0e0e0; 
            border: 1px solid #2d2d2d;
            border-radius: 14px;
            box-shadow: gray;
            }
        body{
            background: purple;
            color: white;
            font-family: sans-serif;
            font-size: 15px;
            background-image: url('https://img.magnific.com/vetores-gratis/plano-de-fundo-da-area-de-trabalho-moderno-vetor-de-desenho-geometrico-azul_53876-135923.jpg?semt=ais_hybrid&w=740&q=80');
            }
        form{
            color: white;
            }
        
        label {
            display: block;
            margin-top: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            margin-top: 15px;
            cursor: pointer;
            background-color: purple;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
     <h1>Aula 01</h1>
    </header>
    <main class="container"> 
        <hr>
        <form action="pagina_gemini.html" method="GET">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
            
            <label for="sobrenome">Sobrenome:</label>
            <input type="text" id="sobrenome" name="sobrenome">
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
            <br>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha">
            <br>
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone">
            <br>
            <label for="nascimento">Data de Nascimento:</label>
            <input type="date" id="nascimento" name="nascimento">
            <br>
            <label for="carros">Gênero</label>
            <select name="carros" id="carros">
                <option value="Cisgênero">Cisgênero</option>
                <option value="Transgênero">Transgênero</option>
                <option value="Não-Binário">Não-Binário</option>
                <option value="Transformers">Transformers</option>
            </select>
            
         
            <label for="mensagem">Observações:</label>
            <textarea id="mensagem" name="mensagem" rows="4"></textarea>
            
            <input type="submit" value="Enviar dados">
        
        </form>  
    </main>
</body>
</html>
