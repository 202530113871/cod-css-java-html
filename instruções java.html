<DOCTYPE html>
<html>
    <head>
     <meta charset="UTF-8" />
     <title>Programação Estruturada</title>
    </head>
    <body>
     <h3>Operações com números</h3>
     <p id="subtracao"></p>
     <p id="soma"></p>
     <p id="multiplicacao"></p>
     <p id="divisao"></p>

     
     <script>
        var num1 = 20;
        var num2 = 8;
        var subtracao = num1 - num2;
        document.getElementById("subtracao").innerHTML = num1 + " - " + num2 + " = " + subtracao;

        var num1 = 30;
        var num2 = 15;
        var soma = num1 + num2;
         document.getElementById("soma").innerHTML = num1 + " + " + num2 + " = " + soma;

        var num1 = 5;
        var num2 = 3;
        var multiplicacao = num1 * num2;
        document.getElementById("multiplicacao").innerHTML = num1 + " * " + num2 + " = " + multiplicacao;

        var num1 = 20;
        var num2 = 4;
        var divisao = num1 / num2;
        document.getElementById("divisao").innerHTML = num1 + " / " + num2 + " = " + divisao;
     </script>
    </body>
    </html>
